name: Docker CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Build Docker
      run: docker build -t myapp .

    - name: Run container
      run: docker run -d -p 5000:5000 myapp